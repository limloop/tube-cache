<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>{% block title %}Video Server{% endblock %}</title>
    
    <!-- CRITICAL: Theme script MUST load immediately to prevent flash -->
    <script>
        // Immediately apply saved theme before any rendering
        (function() {
            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            };
            
            let theme = localStorage.getItem('theme_preference');
            if (!theme) theme = getCookie('theme');
            if (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
            if (!theme) theme = 'light';
            
            // Apply theme immediately
            document.documentElement.setAttribute('data-theme', theme);
            
            // Update meta theme-color immediately
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) {
                meta.content = theme === 'dark' ? '#121212' : '#ffffff';
            }
        })();
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        /* Prevent any flash of unstyled content */
        html:not([data-theme]) {
            background-color: #ffffff;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        .video-card {
            transition: transform 0.2s;
            margin-bottom: 1rem;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .status-badge {
            font-size: 0.8em;
        }
        .progress {
            height: 8px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-play-circle"></i> Video Server
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-door"></i> Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/videos">
                            <i class="bi bi-collection-play"></i> Все видео
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/queue">
                            <i class="bi bi-clock-history"></i> Очередь
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/storage">
                            <i class="bi bi-hdd"></i> Хранилище
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                    <span class="navbar-text text-light">
                        <i class="bi bi-download"></i> Автономный видеосервер
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-5 py-3">
        <div class="container text-center">
            <small class="text-muted">
                Video Server | 
                <a href="#" class="text-decoration-none">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/theme.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
